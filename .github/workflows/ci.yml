name: Merge to develop & main

# Le indica cuando se va a ejecutar este archivo
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# El trabajo que realiza si se realiza una de las anteriores acciones
jobs:
  # Nombre del trabajo, puede ponerse cualquier nombre
  build-and-test:
    # Levanta una maquina virtual de ubuntu
    runs-on: ubuntu-latest

    # Pasos que va a realizar
    steps:
      # Nombre del paso que se realizara
      - name: code-checkout
        # Direccion de un repositorio que se encarga de realizar ciertos pasos
        # dependiendo de la version
        uses: actions/checkout@v4

      - name: JDK-configuration
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build + Tests
        # Ejecuta el proyecto, los test y lo empaqueta
        run: ./mvnw clean verify -B

        # Crea reportes de los test
      - name: publish tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  smoke-test-compose:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v4

        # Prueba en levantar la app, por lo que crea un .env de prueba
      - name: Create test .env
        run: |
          cat <<END > .env
          DATABASE_NAME=buhosapp_ci
          DATABASE_USERNAME=ci_user
          DATABASE_PASSWORD=ci_password
          SPRING_JPA_SHOW_SQL=false
          SPRING_JPA_HIBERNATE_DDL=update
          SPRING_JPA_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
          SPRING_APPLICATION_NAME=app-test
          END

      - name: docker-compose-up
        run: docker compose up --build -d

      - name: wait-response
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:8080/api/role/get/nonexistent -o /dev/null; then
              echo "The application responded correctly."
              exit 0
            fi
            echo "Waiting for the app to start... ($i/15)"
            sleep 3
          done
          echo "The app never responded on time"
          exit 1

      - name: show-logs
        if: failure()
        run: docker compose logs

      - name: shutdown
        if: always()
        run: docker compose down -v